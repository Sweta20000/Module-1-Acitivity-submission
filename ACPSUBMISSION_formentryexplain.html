<!DOCTYPE html>
<html>
<head>
    <title>Registration Form- sweta singh</title>
</head>
<body>
<h2>Registration Form</h2>
<form>
    <hr>
    <!--Below three line explain the textbox how to use text box -->
    Name: <input type="text" placeholder="Enter your name"><br><br>
    Email: <input type="email" placeholder="Enter your email"><br><br>
    Password: <input type="password"><br><br>

<hr>
    <!-- below two button explain how to use radio button -->
    Gender:
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female<br><br>

    <!-- below two button explain how to use checkbox -->
   <hr>
    <input type="checkbox"> Reading
    <input type="checkbox"> Sports<br><br>

    <!--below two button explain how to use Dropdown tab-->
    Course:
    <select>
        <option>HTML</option>
        <option>CSS</option>
        <option>JavaScript</option>
    </select><br><br>
    <hr>
    <!-- Date of birth type used in html -->
    Date of Birth:
    <input type="date"><br><br>
<hr>
    <!-- final Submit button -->
    <input type="submit" value="Register">
<hr>
</form>
<hr>
</body>
</html>
