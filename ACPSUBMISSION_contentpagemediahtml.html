<!DOCTYPE html>
<html>
<head>
    <title>Media Content Page</title>
</head>
<body>
    <h1>My Media Page</h1>
    <h3>Image</h3>
    <img src="https://www.google.com" alt="Sample Image">
    <h3>Audio</h3>
    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>
    <h3>Video</h3>
    <video width="300" controls>
        <source src="video.mp4" type="video/mp4">
        Your browser does not support video.
    </video>

</body>
</html>
